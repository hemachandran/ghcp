<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Performance Report</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111116;
      --surface: #1b1d23;
      --surface-soft: #262a31;
      --text: #f4f4f5;
      --muted: #8b95a1;
      --accent: #d8b565;
      --success: #56d89e;
      --danger: #f15e7c;
      --border: rgba(255, 255, 255, 0.08);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, rgba(216, 181, 101, 0.07), transparent 28%),
                  radial-gradient(circle at bottom right, rgba(168, 192, 211, 0.06), transparent 25%),
                  var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    .page-wrapper {
      max-width: 980px;
      margin: 0 auto;
      padding: 40px 24px 56px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2.2rem, 3vw, 3.2rem);
      line-height: 1.05;
    }

    p.lead {
      margin: 0 0 28px;
      color: var(--muted);
      max-width: 760px;
      font-size: 1rem;
    }

    .summary-card,
    .report-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 28px;
      margin-bottom: 24px;
      box-shadow: 0 32px 90px rgba(0,0,0,0.15);
      backdrop-filter: blur(14px);
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 18px;
    }

    .metric {
      background: var(--surface-soft);
      border-radius: 20px;
      padding: 20px;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .metric-title {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .metric-value {
      margin: 0;
      font-size: 2rem;
      font-weight: 700;
      color: var(--text);
    }

    .metric-meta {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .metric-status {
      display: inline-flex;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 0.83rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .metric-status.pass {
      color: var(--success);
      background: rgba(86, 216, 158, 0.12);
    }

    .metric-status.fail {
      color: var(--danger);
      background: rgba(241, 94, 124, 0.16);
    }

    .report-card pre {
      margin: 0;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 18px;
      padding: 18px;
      overflow: auto;
      color: var(--text);
      font-size: 0.92rem;
      line-height: 1.5;
    }

    .report-meta {
      display: grid;
      gap: 10px;
      margin-top: 14px;
      color: var(--muted);
      font-size: 0.94rem;
    }

    .notice {
      color: var(--muted);
      margin-top: 18px;
      font-size: 0.95rem;
    }

    .report-link {
      color: var(--accent);
      text-decoration: none;
    }

    .report-link:hover,
    .report-link:focus-visible {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main class="page-wrapper">
    <h1>Performance Report</h1>
    <p class="lead">This page loads the latest performance metrics JSON and highlights whether each metric is within the configured budget. Use the query parameter <code>?file=performance-metrics.json</code> to view a custom report file.</p>

    <section id="report"></section>
  </main>

  <script>
    const reportElement = document.getElementById('report');
    const queryParams = new URLSearchParams(window.location.search);
    const fileName = queryParams.get('file') || 'performance-metrics.json';
    const reportUrl = `test-results/${fileName}`;

    const budgets = {
      ttfb: 'TTFB (ms)',
      fcp: 'FCP (ms)',
      lcp: 'LCP (ms)',
      cls: 'CLS',
      inp: 'INP (ms)',
      payloadMb: 'Payload (MB)'
    };

    function formatMetric(value, key) {
      if (value == null || Number.isNaN(value)) return '—';
      if (key === 'payloadMb') return value.toFixed(2);
      if (key === 'cls') return value.toFixed(3);
      return Math.round(value).toLocaleString();
    }

    function createMetricCard(label, value, budget, status) {
      const container = document.createElement('div');
      container.className = 'metric';
      container.innerHTML = `
        <div class="metric-title">${label}</div>
        <p class="metric-value">${value}</p>
        <div class="metric-meta">Budget: ${budget}</div>
        <div class="metric-status ${status.toLowerCase()}">${status}</div>
      `;
      return container;
    }

    function safeText(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    fetch(reportUrl)
      .then((response) => {
        if (!response.ok) throw new Error(`Failed to load report file: ${response.statusText}`);
        return response.json();
      })
      .then((data) => {
        const card = document.createElement('section');
        card.className = 'summary-card';

        const title = document.createElement('h2');
        title.textContent = `Report: ${safeText(fileName)}`;
        card.appendChild(title);

        const pageLink = document.createElement('p');
        pageLink.className = 'report-meta';
        pageLink.innerHTML = `Page URL: <a class="report-link" href="${safeText(data.pageUrl || '#')}" target="_blank" rel="noreferrer noopener">${safeText(data.pageUrl || 'unknown')}</a>`;
        card.appendChild(pageLink);

        const meta = document.createElement('div');
        meta.className = 'report-meta';
        meta.innerHTML = `
          <div>Target file: <strong>${safeText(fileName)}</strong></div>
          <div>Measured URL: <strong>${safeText(data.targetUrl || data.pageUrl || fileName)}</strong></div>
          <div>Saved report: <strong>${safeText(reportUrl)}</strong></div>
        `;
        card.appendChild(meta);

        const metricGrid = document.createElement('div');
        metricGrid.className = 'metric-grid';

        Object.entries(budgets).forEach(([key, label]) => {
          const measured = data[key];
          const budgetValue = data.budgets?.[key];
          const formatted = formatMetric(measured, key);
          const budgetDisplay = budgetValue == null ? '—' : (key === 'cls' ? budgetValue.toFixed(3) : budgetValue);
          const pass = budgetValue == null || measured <= budgetValue;
          const status = pass ? 'PASS' : 'FAIL';

          metricGrid.appendChild(createMetricCard(label, formatted, budgetDisplay, status));
        });

        card.appendChild(metricGrid);
        reportElement.appendChild(card);

        const detailsCard = document.createElement('section');
        detailsCard.className = 'report-card';
        detailsCard.innerHTML = `
          <h2>Raw report data</h2>
          <pre>${safeText(JSON.stringify(data, null, 2))}</pre>
        `;
        reportElement.appendChild(detailsCard);
      })
      .catch((error) => {
        reportElement.innerHTML = `<div class="report-card"><h2>Error loading report</h2><p class="notice">${safeText(error.message)}</p><p class="notice">Confirm that the file <code>${safeText(reportUrl)}</code> exists and is being served by your local web server.</p></div>`;
      });
  </script>
</body>
</html>
